appId: com.zachary.woodbury
productName: Woodbury

directories:
  output: release

# Override "main" inside the built .app only — doesn't touch source package.json
extraMetadata:
  main: electron/main.js

files:
  - dist/**/*
  - node_modules/**/*
  - electron/**/*
  - chrome-extension/**/*
  - configs/**/*
  - tools/desktop-hook
  - package.json
  # Exclude large packages not needed by the dashboard
  - "!node_modules/puppeteer/**"
  - "!node_modules/puppeteer-core/**"
  - "!node_modules/.cache/**"

mac:
  category: public.app-category.developer-tools
  icon: electron/icons/icon.png
  target:
    - target: dmg
      arch:
        - arm64
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist
  hardenedRuntime: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

asar: true
asarUnpack:
  - node_modules/ws/**
  - node_modules/uiohook-napi/**
  - node_modules/robotjs/**
  - node_modules/node-gyp-build/**
  - node_modules/sharp/**
  - node_modules/@img/**
  - node_modules/onnxruntime-node/**
  - node_modules/onnxruntime-common/**
  - tools/**
