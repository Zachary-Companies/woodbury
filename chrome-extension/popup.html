<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #333;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .status.connected {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .status.disconnected {
      background: #fbe9e7;
      color: #c62828;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.green { background: #4caf50; }
    .dot.red { background: #ef5353; }
    .info {
      font-size: 11px;
      color: #666;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #6366f1;
      color: white;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 6px;
    }
    button:hover {
      background: #4f46e5;
    }
    .btn-wcag {
      background: #0f766e;
    }
    .btn-wcag:hover {
      background: #115e59;
    }
    .shortcut-hint {
      font-size: 10px;
      color: #999;
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Woodbury Bridge</h1>
  <div id="status" class="status disconnected">
    <span class="dot red" id="dot"></span>
    <span id="statusText">Checking...</span>
  </div>
  <div class="info" id="info">
    Connects Chrome to the Woodbury CLI for precise browser control.
  </div>
  <button id="wcag-audit" class="btn-wcag">&#x2705; WCAG Audit</button>
  <button id="reconnect">Reconnect</button>
  <div class="shortcut-hint">Alt+S to toggle side panel</div>

  <script src="popup.js"></script>
</body>
</html>
